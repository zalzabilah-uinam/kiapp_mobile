name: Build AAB & APK Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_apk:
        description: 'Build APK also (slower)'
        type: boolean
        default: false
      shorebird_patch:
        description: 'Push Shorebird patch after build'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Cache pub dependencies
        uses: actions/cache@v4
        with:
          path: .dart_tool
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - name: Install dependencies
        run: flutter pub get

      - name: Setup keystore
        id: keystore
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > keystore.jks
            echo "keystore_file=$PWD/keystore.jks" >> $GITHUB_OUTPUT
          else
            echo "keystore_file=" >> $GITHUB_OUTPUT
          fi

      - name: Build AAB
        run: |
          PROPS=""
          if [ -n "${{ steps.keystore.outputs.keystore_file }}" ]; then
            PROPS="-PKEYSTORE_FILE=${{ steps.keystore.outputs.keystore_file }} \
                   -PKEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
                   -PKEY_ALIAS=${{ secrets.KEY_ALIAS }} \
                   -PKEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"
          fi
          flutter build appbundle --release $PROPS

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Build APK (universal — untuk upgrader download)
        if: ${{ github.event_name == 'push' || inputs.build_apk }}
        run: |
          PROPS=""
          if [ -n "${{ steps.keystore.outputs.keystore_file }}" ]; then
            PROPS="-PKEYSTORE_FILE=${{ steps.keystore.outputs.keystore_file }} \
                   -PKEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
                   -PKEY_ALIAS=${{ secrets.KEY_ALIAS }} \
                   -PKEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"
          fi
          flutter build apk --release $PROPS

      - name: Upload APK
        if: ${{ github.event_name == 'push' || inputs.build_apk }}
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Get version
        id: version
        run: |
          VER=$(grep '^version:' pubspec.yaml | cut -d' ' -f2 | cut -d'+' -f1)
          echo "tag=v${VER}+build.${{ github.run_number }}" >> $GITHUB_OUTPUT
          echo "name=Release v${VER}" >> $GITHUB_OUTPUT

      - name: Create Release
        if: ${{ github.event_name == 'push' }}
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          prerelease: true
          generateReleaseNotes: true
          replacesArtifacts: true
          artifactErrorsFailBuild: false
          artifacts: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-release.apk

      - name: Shorebird patch
        if: ${{ inputs.shorebird_patch }}
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          dart pub global activate shorebird
          shorebird patch android --release-version 1.0.0+1 --force
